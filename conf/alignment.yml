# Data Configuration
img_dir: "data/dataset-align/imgs"
abc_dir: "data/dataset-align/abcs-strip"
input_size: 640
num_workers: 4

# Model Configuration
vision_model_name: "convnext_base.dinov3_lvd1689m"
text_model_name: "checkpoints/pretrain/gemma-3-gelato-resized"
text_dim: 1024
vision_feature_dims: 
  - 128
  - 256
  - 512
engram_warm_start: "checkpoints/pretrain/engram_warm_start.pt"

# Low Memory Configuration
visual_pool_size: 12
max_seq_len: 768
grad_accum_steps: 8
mask_ratio: 0.5

# Training Configuration
phase: "alignment"
fine_tune: null
output_dir: "checkpoints"
logging_dir: "runs"
epochs: 2
batch_size: 4
lr_projector: 0.0001
lr_text: 0.00002
logging_steps: 50
save_steps: 500
max_steps: -1
seed: 42
resume: false
resume_from_checkpoint: null
